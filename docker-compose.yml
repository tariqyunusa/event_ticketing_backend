services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
     - ./app:/code/app
     - ./alembic:/code/alembic
    env_file: .env
    environment:
      - WATCHFILES_FORCE_POLLING=true

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
     - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: